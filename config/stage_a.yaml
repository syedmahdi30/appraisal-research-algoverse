# Stage A — text appraisal replication gate. See docs/experiment-1.md, docs/probes.md.
model: google/gemma-3-4b-it
device: cuda
seed: 0

# Tak et al. sampling: 500/emotion, guilt & shame 250 each. Set false to use full split.
tak_subset: true

# Ridge regularization: RidgeCV picks alpha from this grid per appraisal (features are
# standardized first). A fixed small alpha is ill-conditioned on ~2560-dim activations.
ridge_alphas: [1.0, 10.0, 100.0, 1000.0, 10000.0]

# Quick pipeline dry run: set to e.g. 40 to process only 40 train / 10 val examples and
# confirm the whole pipeline runs before the full job. Leave null/absent for the full run.
limit: null

# --- Steering test (stage_a_steering.py) ---
# beta = fraction of the mean residual norm added along z_a (Gemma residual norm is ~1e4-1e5;
# RMSNorm divides by it). Window: <0.02 is swamped, >0.1 breaks coherence (random moves too),
# so sweep the coherent band ~0.02-0.08 and check pleasantness/unpleasantness beat the control.
steering_betas: [-0.08, -0.04, -0.02, 0.02, 0.04, 0.08]
steering_n_prompts: 120         # more prompts -> less noise in the mean valence shift
steering_appraisals: [pleasantness, unpleasantness]   # cleanest valence predictions

# --- Steering v2 (diff-of-means directions, natural scale) ---
# beta = multiples of the low->high Δμ shift. Try a layer band (e.g. [14,16,18,20,22]) if a
# single layer is still flat — multi-layer injection resists RMSNorm wash-out.
steering_v2_layers: [18]
steering_v2_betas: [-3, -2, -1, 1, 2, 3]
steering_v2_n_dir: 1200         # train examples used to estimate Δμ directions
steering_v2_n_prompts: 120
